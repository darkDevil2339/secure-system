<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<form method="POST">

    {{ form.hidden_tag() }}

    {{ form.email.label }}<br>

    {{ form.submit() }}

<a href="/register">Create Account</a>

</body>
</html>
